<!DOCTYPE html>
<html>
<head>
  <title>Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Quicksand;
      background-color: #0d0d1a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    /* STARS */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle linear infinite;
    }

    @keyframes twinkle {
      0%   { opacity: 0; }
      50%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* MAIN CONTENT */
    .content {
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    /* COMING SOON TEXT */
    .coming-soon {
      font-size: 60px;
      font-weight: bold;
      letter-spacing: 8px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #a7c4f4, #c3a7f4, #f4a7c3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glow 3s ease-in-out infinite;
      margin-bottom: 10px;
    }

    @keyframes glow {
      0%   { filter: brightness(1); }
      50%  { filter: brightness(1.3); }
      100% { filter: brightness(1); }
    }

    .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 3px;
      margin-bottom: 50px;
      text-transform: uppercase;
    }

    /* NOVEL NAME */
    .novel-name {
      font-size: 22px;
      color: #c3a7f4;
      letter-spacing: 2px;
      margin-bottom: 40px;
      text-shadow: 0 0 15px rgba(195,167,244,0.6);
    }

    /* COUNTDOWN */
    .countdown-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .time-block {
      background: linear-gradient(135deg, rgba(167,196,244,0.1), rgba(195,167,244,0.1));
      border: 1px solid rgba(195,167,244,0.3);
      border-radius: 15px;
      padding: 20px 25px;
      min-width: 90px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(195,167,244,0.2);
    }

    .time-block span {
      font-size: 42px;
      font-weight: bold;
      display: block;
      background: linear-gradient(180deg, #ffffff, #c3a7f4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .time-block p {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 5px;
    }

    .divider {
      font-size: 36px;
      color: rgba(195,167,244,0.4);
      margin-bottom: 20px;
    }

    /* RELEASED MESSAGE */
    .released-msg {
      font-size: 28px;
      color: #c3a7f4;
      text-shadow: 0 0 20px rgba(195,167,244,0.8);
      display: none;
      margin-bottom: 30px;
    }

    /* BACK BUTTON */
    .back-btn {
      display: inline-block;
      background: linear-gradient(135deg, #a7c4f4, #c3a7f4);
      color: white;
      padding: 12px 30px;
      border-radius: 50px;
      text-decoration: none;
      font-family: Quicksand;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(195,167,244,0.3);
    }

    .back-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(195,167,244,0.6);
    }

    /* PETAL EFFECT */
    .petal {
      position: fixed;
      top: -20px;
      border-radius: 150% 0 150% 0;
      opacity: 0.6;
      animation: falling linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes falling {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 0.6;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* RAIN EFFECT */
    .raindrop {
      position: fixed;
      top: -20px;
      width: 1px;
      border-radius: 50%;
      opacity: 0;
      animation: raining linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes raining {
      0% {
        transform: translateY(-20px) translateX(0px);
        opacity: 0;
      }
      10% {
        opacity: 0.6;
      }
      90% {
        opacity: 0.4;
      }
      100% {
        transform: translateY(110vh) translateX(20px);
        opacity: 0;
      }
    }

    /* SPLASH EFFECT */
    .splash {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: splashing ease-out forwards;
    }

    @keyframes splashing {
      0% {
        width: 2px;
        height: 2px;
        opacity: 0.6;
      }
      100% {
        width: 15px;
        height: 4px;
        opacity: 0;
      }
    }

    /* MOBILE */
    @media (max-width: 480px) {
      .coming-soon {
        font-size: 32px;
        letter-spacing: 4px;
      }

      .time-block {
        padding: 15px 18px;
        min-width: 70px;
      }

      .time-block span { font-size: 30px; }
      .novel-name { font-size: 18px; }
      .divider { font-size: 24px; }
    }
  </style>
</head>
<body>

  <!-- Stars background -->
  <div class="stars" id="stars"></div>

  <div class="content">

    <div class="coming-soon">Coming Soon</div>
    <div class="subtitle">✦ A New Story Awaits ✦</div>

    <div class="novel-name">✨ The Other Side Of Rain ✨</div>

    <div class="countdown-box" id="countdownBox">
      <div class="time-block">
        <span id="days">00</span>
        <p>Days</p>
      </div>
      <div class="divider">:</div>
      <div class="time-block">
        <span id="hours">00</span>
        <p>Hours</p>
      </div>
      <div class="divider">:</div>
      <div class="time-block">
        <span id="minutes">00</span>
        <p>Minutes</p>
      </div>
      <div class="divider">:</div>
      <div class="time-block">
        <span id="seconds">00</span>
        <p>Seconds</p>
      </div>
    </div>

    <div class="released-msg" id="releasedMsg">
      🎉 It's Here! Go Read It Now! 🎉
    </div>

    <a href="index.html" class="back-btn">← Back to Novel Site</a>

  </div>

  <script>
    /* COUNTDOWN */
    var releaseDate = new Date("14 May, 2026 00:00:00 UTC");

    function updateCountdown() {
      var now  = new Date();
      var diff = releaseDate - now;

      if (diff <= 0) {
        document.getElementById('countdownBox').style.display = 'none';
        document.getElementById('releasedMsg').style.display = 'block';
        return;
      }

      var days    = Math.floor(diff / (1000 * 60 * 60 * 24));
      var hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').innerText    = String(days).padStart(2, '0');
      document.getElementById('hours').innerText   = String(hours).padStart(2, '0');
      document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
      document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    /* STARS */
    var starsContainer = document.getElementById('stars');
    for (var i = 0; i < 100; i++) {
      var star = document.createElement('div');
      star.classList.add('star');
      var size = Math.random() * 3 + 1;
      star.style.width  = size + 'px';
      star.style.height = size + 'px';
      star.style.left   = Math.random() * 100 + 'vw';
      star.style.top    = Math.random() * 100 + 'vh';
      star.style.animationDuration = Math.random() * 3 + 2 + 's';
      star.style.animationDelay   = Math.random() * 3 + 's';
      starsContainer.appendChild(star);
    }

    /* PETALS */
    var petalColors = ['#ffb7c5', '#ffd4e8', '#e8b4d8', '#c3a7f4', '#a7c4f4'];

    function createPetal() {
      var petal = document.createElement('div');
      petal.classList.add('petal');
      var size = Math.random() * 10 + 6;
      petal.style.width           = size + 'px';
      petal.style.height          = size + 'px';
      petal.style.left            = Math.random() * 100 + 'vw';
      petal.style.backgroundColor = petalColors[Math.floor(Math.random() * petalColors.length)];
      var speed = Math.random() * 5 + 4;
      petal.style.animationDuration = speed + 's';
      petal.style.animationDelay   = Math.random() * 3 + 's';
      document.body.appendChild(petal);
      setTimeout(function() { petal.remove(); }, (speed + 3) * 1000);
    }

    setInterval(createPetal, 400);

    /* RAIN */
    var rainColors = [
      'rgba(174, 214, 241, 0.7)',
      'rgba(133, 193, 233, 0.7)',
      'rgba(195, 167, 244, 0.5)',
      'rgba(167, 196, 244, 0.6)',
      'rgba(255, 255, 255, 0.4)',
    ];

    function createRain() {
      var drop = document.createElement('div');
      drop.classList.add('raindrop');

      var height = Math.random() * 20 + 10;
      drop.style.height          = height + 'px';
      drop.style.left            = Math.random() * 100 + 'vw';
      drop.style.backgroundColor = rainColors[Math.floor(Math.random() * rainColors.length)];

      var speed = Math.random() * 0.8 + 0.4;
      drop.style.animationDuration = speed + 's';
      drop.style.animationDelay   = Math.random() * 2 + 's';

      document.body.appendChild(drop);

      /* create splash when drop reaches bottom */
      var splashDelay = speed * 1000;
      setTimeout(function() {
        createSplash(drop.style.left);
        drop.remove();
      }, splashDelay + 500);
    }

    function createSplash(leftPos) {
      var splash = document.createElement('div');
      splash.classList.add('splash');
      splash.style.left            = leftPos;
      splash.style.bottom          = '0px';
      splash.style.backgroundColor = 'rgba(174, 214, 241, 0.4)';
      splash.style.animationDuration = '0.4s';
      document.body.appendChild(splash);
      setTimeout(function() { splash.remove(); }, 400);
    }

    /* normal rain every 50ms */
    setInterval(createRain, 50);

    /* heavy rain bursts every 3s */
    setInterval(function() {
      for (var i = 0; i < 10; i++) {
        setTimeout(createRain, i * 30);
      }
    }, 3000);

  </script>

</body>
</html>
